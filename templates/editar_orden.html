{% extends 'base.html' %}
{% block content %}

<div class="container-fluid">

    <h2 class="text-center fw-bold mb-4">
        EDITAR ORDEN {{ orden.po }}
    </h2>

    <form method="POST">

        <div class="card shadow-sm mb-3">
            <div class="card-header bg-dark text-warning fw-bold">
                Datos Generales
            </div>

            <div class="card-body">

                <div class="row">

                    <div class="col-md-3">
                        <label>PO</label>
                        <input class="form-control"
                               value="{{ orden.po }}"
                               readonly>
                    </div>

                    <div class="col-md-3">
                        <label>Fecha</label>
                        <input class="form-control"
                               type="date"
                               name="fecha"
                               value="{{ orden.fecha }}">
                    </div>

                    <div class="col-md-6">
                        <label>Proveedor</label>
                        <input class="form-control"
                               name="proveedor"
                               value="{{ orden.proveedor }}">
                    </div>

                </div>

                <div class="mt-3">
                    <label>Observaciones</label>
                    <textarea class="form-control"
                              rows="3"
                              name="memo">{{ orden.memo or '' }}</textarea>
                </div>

            </div>
        </div>

        <div class="card shadow-sm">

            <div class="card-header bg-dark text-warning fw-bold">
                Productos
            </div>

            <div class="card-body">

                <table class="table table-bordered">

                    <thead class="table-dark">

                        <tr>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Precio Compra</th>
                            <th>Precio Venta</th>
                            <th>Subtotal</th>
                        </tr>

                    </thead>

                    <tbody>

                        {% for d in detalles %}
                        <tr>

                            <td>
                                <input class="form-control"
                                       name="producto[]"
                                       value="{{ d.producto }}">
                            </td>

                            <td>
                                <input class="form-control"
                                       type="number"
                                       name="cantidad[]"
                                       value="{{ d.cantidad }}">
                            </td>

                            <td>
                                <input class="form-control"
                                       type="number"
                                       step="0.01"
                                       name="precio[]"
                                       value="{{ d.precio }}">
                            </td>

                            <td>
                                <input class="form-control"
                                       type="number"
                                       step="0.01"
                                       name="precio_venta[]"
                                       value="{{ d.precio_venta }}">
                            </td>

                            <td>
                                C${{ '%.2f'|format(d.subtotal) }}
                            </td>

                        </tr>
                        {% endfor %}

                    </tbody>

                </table>

                <div class="d-flex justify-content-end gap-2">

                    <a href="{{ url_for('gestion_ordenes') }}"
                       class="btn btn-secondary">
                        Cancelar
                    </a>

                    <button type="submit"
                            class="btn btn-success">
                        Guardar Cambios
                    </button>

                </div>

            </div>

        </div>

    </form>

</div>

{% endblock %}
