{% extends 'base.html' %}
{% block content %}

<style>
.producto-box{
    position:relative;
}
.lista-productos{
    position:absolute;
    top:42px;
    left:0;
    right:0;
    background:white;
    border:1px solid #ccc;
    z-index:9999;
    max-height:180px;
    overflow-y:auto;
    box-shadow:0 4px 10px rgba(0,0,0,.15);
}
.opcion-producto{
    padding:8px 10px;
    cursor:pointer;
}
.opcion-producto:hover{
    background:#d4af37;
    color:#111;
    font-weight:bold;
}
</style>

<div class="container-fluid">

    <h2 class="text-center fw-bold mb-4">
        EDITAR ORDEN {{ orden.po }}
    </h2>

    <form method="POST">

        <div class="card shadow-sm mb-3">
            <div class="card-header bg-dark text-warning fw-bold">
                Datos Generales
            </div>

            <div class="card-body">
                <div class="row">
                    <div class="col-md-3">
                        <label>PO</label>
                        <input class="form-control" value="{{ orden.po }}" readonly>
                    </div>

                    <div class="col-md-3">
                        <label>Fecha</label>
                        <input class="form-control" type="date" name="fecha" value="{{ orden.fecha }}">
                    </div>

                    <div class="col-md-6">
                        <label>Proveedor</label>
                        <input class="form-control" name="proveedor" value="{{ orden.proveedor }}">
                    </div>
                </div>

                <div class="mt-3">
                    <label>Observaciones</label>
                    <textarea class="form-control" rows="3" name="memo">{{ orden.memo or '' }}</textarea>
                </div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-dark text-warning fw-bold d-flex justify-content-between align-items-center">
                <span>Productos</span>
                <button type="button" class="btn btn-warning btn-sm fw-bold" onclick="agregarFila()">
                    ➕ Agregar producto
                </button>
            </div>

            <div class="card-body">
                <table class="table table-bordered align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Precio Compra</th>
                            <th>Precio Venta</th>
                            <th>Subtotal</th>
                            <th style="width:90px;">Acción</th>
                        </tr>
                    </thead>

                    <tbody id="tablaProductos">
                        {% for d in detalles %}
                        <tr>
                            <td>
                                <div class="producto-box">
                                    <input class="form-control producto-input"
                                           name="producto[]"
                                           value="{{ d.producto }}"
                                           autocomplete="off"
                                           required>
                                    <div class="lista-productos"></div>
                                </div>
                            </td>

                            <td>
                                <input class="form-control cantidad" type="number" min="1" name="cantidad[]" value="{{ d.cantidad }}" oninput="calcularFila(this)" required>
                            </td>

                            <td>
                                <input class="form-control precio" type="number" step="0.01" min="0" name="precio[]" value="{{ d.precio }}" oninput="calcularFila(this)" required>
                            </td>

                            <td>
                                <input class="form-control precio-venta" type="number" step="0.01" min="0" name="precio_venta[]" value="{{ d.precio_venta }}" required>
                            </td>

                            <td class="subtotal">
                                C${{ '%.2f'|format(d.subtotal) }}
                            </td>

                            <td>
                                <button type="button" class="btn btn-danger btn-sm" onclick="eliminarFila(this)">
                                    🗑
                                </button>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>

                <div class="d-flex justify-content-end gap-2">
                    <a href="{{ url_for('gestion_ordenes') }}" class="btn btn-secondary">
                        Cancelar
                    </a>

                    <button type="submit" class="btn btn-success">
                        Guardar Cambios
                    </button>
                </div>
            </div>
        </div>

    </form>
</div>

<script>
function agregarFila() {
    const tabla = document.getElementById("tablaProductos");
    const fila = document.createElement("tr");

    fila.innerHTML = `
        <td>
            <div class="producto-box">
                <input class="form-control producto-input" name="producto[]" placeholder="Nombre del producto" autocomplete="off" required>
                <div class="lista-productos"></div>
            </div>
        </td>

        <td>
            <input class="form-control cantidad" type="number" min="1" name="cantidad[]" value="1" oninput="calcularFila(this)" required>
        </td>

        <td>
            <input class="form-control precio" type="number" step="0.01" min="0" name="precio[]" value="0" oninput="calcularFila(this)" required>
        </td>

        <td>
            <input class="form-control precio-venta" type="number" step="0.01" min="0" name="precio_venta[]" value="0" required>
        </td>

        <td class="subtotal">
            C$0.00
        </td>

        <td>
            <button type="button" class="btn btn-danger btn-sm" onclick="eliminarFila(this)">
                🗑
            </button>
        </td>
    `;

    tabla.appendChild(fila);
}

function eliminarFila(btn) {
    btn.closest("tr").remove();
}

function calcularFila(input) {
    const fila = input.closest("tr");
    const cantidad = parseFloat(fila.querySelector(".cantidad").value) || 0;
    const precio = parseFloat(fila.querySelector(".precio").value) || 0;
    const subtotal = cantidad * precio;

    fila.querySelector(".subtotal").textContent = "C$" + subtotal.toFixed(2);
}

document.addEventListener("input", async function(e) {
    if (!e.target.classList.contains("producto-input")) return;

    const input = e.target;
    const valor = input.value.trim();
    const fila = input.closest("tr");
    const lista = fila.querySelector(".lista-productos");

    if (valor.length < 1) {
        lista.innerHTML = "";
        return;
    }

    const res = await fetch(`/api/productos/buscar?q=${encodeURIComponent(valor)}`);
    const data = await res.json();

    if (!data.productos || data.productos.length === 0) {
        lista.innerHTML = `<div class="opcion-producto">No encontrado</div>`;
        return;
    }

    lista.innerHTML = data.productos.map(p => `
        <div class="opcion-producto"
             data-nombre="${p.nombre}"
             data-precio="${p.precio}">
            ${p.nombre} - Stock: ${p.stock} ${p.unidad}
        </div>
    `).join("");
});

document.addEventListener("click", function(e) {
    if (!e.target.classList.contains("opcion-producto")) {
        document.querySelectorAll(".lista-productos").forEach(l => l.innerHTML = "");
        return;
    }

    const opcion = e.target;

    if (opcion.textContent.trim() === "No encontrado") return;

    const fila = opcion.closest("tr");

    fila.querySelector(".producto-input").value = opcion.dataset.nombre;

    const precioVenta = fila.querySelector(".precio-venta");
    if (precioVenta && (!precioVenta.value || precioVenta.value == "0")) {
        precioVenta.value = opcion.dataset.precio;
    }

    fila.querySelector(".lista-productos").innerHTML = "";
});
</script>

{% endblock %}
