<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Registro - Palmar</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:
    radial-gradient(circle at top,#1f1f1f,#0d0d0d);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;
}

.registro-container{
    width:1100px;
    max-width:95%;
    background:white;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 15px 45px rgba(0,0,0,.45);
    display:flex;
}

.registro-left{
    width:45%;
    background:
    radial-gradient(circle at top,#2b2b2b,#111111,#000000);
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:50px;
}

.registro-logo{
    width:260px;
    display:block;
    background:transparent;
    border:none;
    border-radius:0;
    box-shadow:none;
    filter:
        drop-shadow(0 0 8px rgba(212,175,55,.20))
        drop-shadow(0 0 20px rgba(212,175,55,.10));
}

.registro-title{
    color:#d4af37;
    font-size:65px;
    font-weight:900;
    margin-top:20px;
    letter-spacing:3px;
    text-shadow:
        0 0 8px rgba(212,175,55,.25);
}

.registro-sub{
    color:#e5e5e5;
    font-size:20px;
    margin-top:15px;
    text-align:center;
}

.registro-right{
    width:55%;
    padding:50px;
}

.registro-right h2{
    text-align:center;
    color:#111;
    font-size:50px;
    font-weight:900;
    margin-bottom:30px;
}

.form-label{
    font-size:20px;
    font-weight:700;
    color:#222;
}

.form-control,
.form-select{
    height:55px;
    border-radius:12px;
    font-size:18px;
}

.form-control:focus,
.form-select:focus{
    border-color:#d4af37;
    box-shadow:0 0 0 .25rem rgba(212,175,55,.25);
}

.btn-register{
    background:#d4af37;
    border:none;
    color:#111;
    font-weight:800;
    font-size:20px;
    height:55px;
    border-radius:12px;
    transition:.3s;
}

.btn-register:hover{
    background:#c59616;
    transform:translateY(-2px);
}

.login-link{
    display:block;
    text-align:center;
    margin-top:20px;
    text-decoration:none;
    color:#d4af37;
    font-weight:800;
    font-size:18px;
}

.login-link:hover{
    color:#b8870d;
}

.alert{
    border-radius:12px;
}

@media(max-width:900px){

    .registro-container{
        flex-direction:column;
    }

    .registro-left,
    .registro-right{
        width:100%;
    }

    .registro-logo{
        width:180px;
    }

    .registro-title{
        font-size:45px;
    }

    .registro-right h2{
        font-size:35px;
    }

    .registro-right{
        padding:35px;
    }
}

</style>
</head>

<body>

<div class="registro-container">

    <div class="registro-left">

        <img
            src="{{ url_for('static', filename='img/YE.png') }}"
            class="registro-logo"
            alt="Logo"
        >

        <div class="registro-title">
            YAMIL
        </div>

        <div class="registro-sub">
            Sistema de Facturación e Inventario
        </div>

    </div>

    <div class="registro-right">

        <h2>Crear Cuenta</h2>

        {% with messages=get_flashed_messages(with_categories=true) %}
            {% for category,message in messages %}
                <div class="alert alert-{{category}}">
                    {{message}}
                </div>
            {% endfor %}
        {% endwith %}

        <form method="post">

            <div class="mb-3">
                <label class="form-label">Nombre completo</label>
                <input
                    type="text"
                    name="usuario"
                    class="form-control"
                    required
                >
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required
                >
            </div>

            <div class="mb-3">
                <label class="form-label">Confirmar contraseña</label>
                <input
                    type="password"
                    name="confirmar"
                    class="form-control"
                    required
                >
            </div>

            <input type="hidden" name="rol" value="Cliente">

            <div class="mb-4">
                <label class="form-label">Tipo de cuenta</label>
                <input
                    type="text"
                    class="form-control"
                    value="Cliente"
                    readonly
                >
            </div>

            <button
                type="submit"
                class="btn btn-register w-100"
            >
                Crear Cuenta
            </button>

        </form>

        <a
            href="{{ url_for('login') }}"
            class="login-link"
        >
            Ya tengo una cuenta
        </a>

    </div>

</div>

</body>
</html>
