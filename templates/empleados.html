{% extends 'base.html' %}{% block content %}<h2 class="fw-bold">Empleados</h2><div class="card p-3 mb-3"><form method="post" class="row g-2"><div class="col-md-2"><input class="form-control" name="nombre" placeholder="Nombre" required></div><div class="col-md-2"><input class="form-control" name="apellido" placeholder="Apellido"></div><div class="col-md-2"><input class="form-control" name="cedula" placeholder="Cédula"></div><div class="col-md-2"><input class="form-control" name="telefono" placeholder="Teléfono"></div><div class="col-md-2"><input class="form-control" name="cargo" placeholder="Cargo"></div><div class="col-md-1"><input class="form-control" name="salario" placeholder="Salario"></div><div class="col-md-1"><button class="btn btn-warning w-100">Guardar</button></div></form></div><div class="card p-3 table-responsive"><table class="table"><tr><th>Nombre</th><th>Cédula</th><th>Teléfono</th><th>Cargo</th><th>Salario</th><th>Estado</th><th></th></tr>{% for e in empleados %}<tr><td>{{e.nombre}} {{e.apellido}}</td><td>{{e.cedula}}</td><td>{{e.telefono}}</td><td>{{e.cargo}}</td><td>C${{e.salario}}</td><td>{{e.estado}}</td><td><form method="post" action="{{url_for('eliminar_empleado', id=e.id)}}"><button class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar?')">Eliminar</button></form></td></tr>{% endfor %}</table></div>{% endblock %}
