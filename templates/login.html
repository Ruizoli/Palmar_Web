<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Palmar - Iniciar Sesión</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:
    radial-gradient(circle at top,#1f1f1f,#0d0d0d);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;
}

.login-container{
    width:1100px;
    max-width:95%;
    background:white;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 15px 45px rgba(0,0,0,.45);
    display:flex;
}

.login-left{
    width:50%;
    background:
    radial-gradient(circle at top,#2b2b2b,#111111,#000000);
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:50px;
}

.login-logo{
    width:260px;
    display:block;
    background:transparent;
    border:none;
    border-radius:0;
    box-shadow:none;
    filter:
        drop-shadow(0 0 8px rgba(212,175,55,.20))
        drop-shadow(0 0 20px rgba(212,175,55,.10));
}

.login-title{
    color:#d4af37;
    font-size:65px;
    font-weight:900;
    margin-top:20px;
    letter-spacing:3px;
    text-shadow:
        0 0 8px rgba(212,175,55,.25);
}

.login-subtitle{
    color:#e5e5e5;
    font-size:20px;
    margin-top:15px;
    text-align:center;
}

.login-right{
    width:50%;
    padding:60px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.login-right h2{
    text-align:center;
    font-size:48px;
    font-weight:900;
    color:#111;
    margin-bottom:35px;
}

.form-label{
    font-size:20px;
    font-weight:700;
    color:#222;
}

.form-control{
    height:55px;
    border-radius:12px;
    font-size:18px;
}

.form-control:focus{
    border-color:#d4af37;
    box-shadow:0 0 0 .25rem rgba(212,175,55,.25);
}

.btn-login{
    height:55px;
    border:none;
    border-radius:12px;
    background:#d4af37;
    color:#111;
    font-size:20px;
    font-weight:800;
    transition:.3s;
}

.btn-login:hover{
    background:#c59616;
    transform:translateY(-2px);
}

.register-link{
    text-align:center;
    display:block;
    margin-top:20px;
    text-decoration:none;
    color:#d4af37;
    font-weight:800;
    font-size:18px;
}

.register-link:hover{
    color:#b8870d;
}

.alert{
    border-radius:12px;
}

@media(max-width:900px){

    .login-container{
        flex-direction:column;
    }

    .login-left,
    .login-right{
        width:100%;
    }

    .login-right{
        padding:35px;
    }

    .login-title{
        font-size:45px;
    }

    .login-logo{
        width:180px;
    }

    .login-right h2{
        font-size:35px;
    }
}

</style>

</head>

<body>

<div class="login-container">

    <div class="login-left">

        <img
            src="{{ url_for('static', filename='img/YE.png') }}"
            class="login-logo"
            alt="Logo"
        >

        <div class="login-title">
            YAMIL
        </div>

        <div class="login-subtitle">
            Sistema de Facturación e Inventario
        </div>

    </div>

    <div class="login-right">

        <h2>Iniciar Sesión</h2>

        {% with messages=get_flashed_messages(with_categories=true) %}
            {% for category,message in messages %}
                <div class="alert alert-{{category}}">
                    {{message}}
                </div>
            {% endfor %}
        {% endwith %}

        <form method="post">

            <div class="mb-3">
                <label class="form-label">
                    Usuario
                </label>

                <input
                    type="text"
                    name="usuario"
                    class="form-control"
                    required
                    autofocus
                >
            </div>

            <div class="mb-4">
                <label class="form-label">
                    Contraseña
                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required
                >
            </div>

            <button type="submit" class="btn btn-login w-100">
                Iniciar Sesión
            </button>

        </form>

        <a
            href="{{ url_for('registro') }}"
            class="register-link"
        >
            Crear una cuenta nueva
        </a>

    </div>

</div>

</body>
</html>
